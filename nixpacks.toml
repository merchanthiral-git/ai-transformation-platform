# Nixpacks build configuration for Railway
# Tells the builder to use the backend directory for Python deps

[phases.setup]
nixPkgs = ["python312", "gcc"]

[phases.install]
cmds = ["cd backend && pip install -r requirements.txt"]

[start]
cmd = "cd backend && python -m uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000}"
